                                以逗号分隔的配置列表，声部内每个谱表一项：\
                                <br>- 谱线数量\
                                <br>- 'small' 表示该谱表为小号谱表（'s'）\
                                <br>\
                                （例如 5s,5 表示该声部由一个小五线谱后接一个标准五线谱组成）\
                                </html>

