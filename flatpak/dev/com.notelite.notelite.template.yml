# ----
# flatpak-builder manifest file template
# to be expanded and copied from flatpak/dev to flatpak/flathub
# via the gradle task :flatpak:genManifest
#
# Variables names and example values:
# - OPEN_JDK:       openjdk21
# - GRADLE_URL:     https\\://services.gradle.org/distributions/gradle-8.5-all.zip
# - GRADLE_NAME:    gradle-8.5-all.zip
# - GRADLE_SHA256:  c16d517b50dd28b3f5838f0e844b7520b8f1eb610f2f29de7e4e04a1b7c9c79b
# - COMMIT:         db8046ad8bfba7872cb68df7d8786152f357ab39
# ----

id: com.notelite.notelite
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.${OPEN_JDK}
build-options:
  append-path: "/usr/lib/sdk/${OPEN_JDK}/bin"
command: NoteLite
finish-args:
  # Network access
  - --share=network
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Needs to save files locally
  - --filesystem=xdg-documents
  - --filesystem=xdg-pictures
  - --persist=~/.notelite
  - --env=PATH=/app/bin:/app/jre/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre
  # Calling abort() on malloc-check doesn't fly with OpenJDK
  - --env=MALLOC_CHECK_=0
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/${OPEN_JDK}/install.sh

  - name: notelite
    buildsystem: simple
    build-commands:
      # We make the Gradle wrapper use our local .zip file
      # NOTA: template expansion will reduce the backslashes in template, so double them!
      - ln --force ${GRADLE_NAME} gradle/wrapper/${GRADLE_NAME}
      - >-
        sed --regexp-extended --in-place
        's,https\\\\://services.gradle.org/distributions/,file:\\/run/build/notelite/,'
        gradle/wrapper/gradle-wrapper.properties

      # Copy some needed icons
      - install --mode=0644 -D app/res/icon-256.png /app/share/icons/hicolor/256x256/apps/com.notelite.notelite.png
      - install --mode=0644 -D app/res/icon-64.png /app/share/icons/hicolor/64x64/apps/com.notelite.notelite.png
      - install --mode=0644 -D app/src/main/java/org/notelite/omr/ui/resources/icon-48.png /app/share/icons/hicolor/48x48/apps/com.notelite.notelite.png
      - install --mode=0644 -D app/src/main/java/org/notelite/omr/ui/resources/icon-32.png /app/share/icons/hicolor/32x32/apps/com.notelite.notelite.png
      - install --mode=0644 -D app/src/main/java/org/notelite/omr/ui/resources/icon-24.png /app/share/icons/hicolor/24x24/apps/com.notelite.notelite.png
      - install --mode=0644 -D app/src/main/java/org/notelite/omr/ui/resources/icon-16.png /app/share/icons/hicolor/16x16/apps/com.notelite.notelite.png

      # Copy desktop and metainfo
      - install --mode=0644 -D com.notelite.notelite.desktop /app/share/applications/com.notelite.notelite.desktop
      - install --mode=0644 -D com.notelite.notelite.metainfo.xml /app/share/metainfo/com.notelite.notelite.metainfo.xml

      # Run Gradle build in offline mode, with a specific repository (hence the isFlatpak property)
      - ./gradlew -PisFlatpak=true --offline distTar

      # Extract lib and bin from NoteLite .tar to /app
      - tar x --directory=/app --strip-components=1 --file app/build/distributions/*.tar

    sources:
      # NOTA: Paths are relative to the location of the expanded template, that is flatpak/flathub
      
      # NoteLite project. We provide the commit hash value
      - type: git
        url: https://github.com/ORG/notelite
        commit: ${COMMIT}

      - type: file
        url: ${GRADLE_URL}
        sha256: ${GRADLE_SHA256}

      - type: file
        path: com.notelite.notelite.desktop

      - type: file
        path: com.notelite.notelite.metainfo.xml

      # Include app dependencies.json, generated by Gradle task :flatpak:genDependencies
      - dependencies.json
